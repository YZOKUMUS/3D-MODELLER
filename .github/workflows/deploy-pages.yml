# Her push'ta siteyi otomatik derleyip GitHub Pages'e yükler.
# Ayar: Repo -> Settings -> Pages -> Source: GitHub Actions
#
# NOT: Hesapta "billing" kilidi varsa bu is AKISMAZ. O zaman KOLAY-GITHUB-PAGES.txt
# icindeki "Deploy from a branch" + docs/ yontemini kullanin (npm run publish:docs).

name: GitHub Pages web yayini

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Bagimliliklari yukle
        run: npm ci

      - name: Web build (dist)
        run: npm run export:web

      - name: Pages icin paketle
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Yayinla
        id: deploy
        uses: actions/deploy-pages@v4
